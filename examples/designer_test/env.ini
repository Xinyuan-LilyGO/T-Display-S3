; PlatformIO environment for the designer_test example.
; Included by the root platformio.ini via extra_configs.
; To build/upload:  pio run -e designer_test -t upload

[env:designer_test]
build_flags =
    ${env.build_flags}
board_build.partitions = examples/designer_test/partitions_designer_test.csv
board_build.filesystem = littlefs
lib_deps =
    Bodmer/TJpg_Decoder
lib_ignore =
    GFX Library for Arduino
    arduino-nofrendo
    Adafruit MPR121
    DabbleESP32
    PCF8575 library
    PCA95x5
    lvgl
